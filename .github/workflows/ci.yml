name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-quality:
    name: Rust quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out the repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install the stable Rust toolchain
        run: rustup toolchain install stable --profile minimal --component clippy,rustfmt

      - name: Select the stable Rust toolchain
        run: rustup default stable

      - name: Check formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --all-targets

  macos-nix-integration:
    name: macOS + Nix integration
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Check out the repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install the stable Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Select the stable Rust toolchain
        run: rustup default stable

      - name: Run tests on macOS
        run: cargo test --all-targets

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31.10.7
        with:
          github_access_token: ${{ github.token }}

      - name: Check the flake
        run: nix flake check --print-build-logs

      - name: Smoke-test a host without nix-darwin automatic GC
        run: |
          report="$(nix run .)"
          printf '%s\n' "$report"
          grep -Fxq 'Garbage collection: not detected' <<<"$report"
